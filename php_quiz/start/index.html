<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHP総合演習 クイズアプリ</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .choice-btn {
            width: 100%;
            text-align: left;
            margin-bottom: 10px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h1 class="text-center mb-4">PHP Quiz App</h1>

                <div id="quiz-container" class="card shadow-sm p-4">
                    <div id="loading" class="text-center">読み込み中...</div>

                    <div id="question-area" class="hidden">
                        <h4 id="question-text" class="mb-4">問題文がここに入ります</h4>
                        <div id="choices-area">
                            <!-- 選択肢ボタンがJSで生成される -->
                        </div>
                    </div>

                    <div id="result-area" class="hidden mt-4 alert">
                        <h4 id="result-title">判定結果</h4>
                        <p id="explanation-text"></p>
                        <button id="next-btn" class="btn btn-primary mt-2">次の問題へ</button>
                    </div>

                    <div id="score-area" class="hidden text-center">
                        <h3>終了！</h3>
                        <p>正解数: <span id="score-count"></span> / <span id="total-count"></span></p>
                        <button onclick="location.reload()" class="btn btn-secondary">もう一度挑戦</button>
                    </div>
                </div>

                <div class="text-center mt-3">
                    <a href="admin.html" class="text-muted small">管理者画面へ</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/quiz/main.js"></script>
</body>

</html>
