<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>クイズ管理画面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hidden {
            display: none;
        }
    </style>
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">Quiz Admin</span>
            <button id="logout-btn" class="btn btn-outline-light btn-sm hidden">ログアウト</button>
        </div>
    </nav>

    <div class="container">
        <!-- ログインフォーム -->
        <div id="login-section" class="card p-4 mx-auto" style="max-width: 400px;">
            <h3 class="text-center mb-3">管理者ログイン</h3>
            <input type="text" id="username" class="form-control mb-2" placeholder="ユーザー名 (admin)">
            <input type="password" id="password" class="form-control mb-3" placeholder="パスワード (admin123)">
            <button id="login-btn" class="btn btn-primary w-100">ログイン</button>
            <p id="login-error" class="text-danger mt-2 text-center"></p>
        </div>

        <!-- 管理画面（ログイン後表示） -->
        <div id="admin-section" class="hidden">

            <!-- 編集・作成フォーム -->
            <div class="card p-4 mb-4 border-primary">
                <h4 id="form-title">新規問題作成</h4>
                <div class="mb-3">
                    <label>問題文</label>
                    <textarea id="q-text" class="form-control" rows="2"></textarea>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-2">
                        <input type="text" id="c1" class="form-control" placeholder="選択肢1">
                    </div>
                    <div class="col-md-6 mb-2">
                        <input type="text" id="c2" class="form-control" placeholder="選択肢2">
                    </div>
                    <div class="col-md-6 mb-2">
                        <input type="text" id="c3" class="form-control" placeholder="選択肢3">
                    </div>
                    <div class="col-md-6 mb-2">
                        <input type="text" id="c4" class="form-control" placeholder="選択肢4">
                    </div>
                </div>
                <div class="row mt-2">
                    <div class="col-md-4">
                        <label>正解番号 (1-4)</label>
                        <select id="correct" class="form-select">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                        </select>
                    </div>
                    <div class="col-md-8">
                        <label>解説</label>
                        <input type="text" id="exp" class="form-control">
                    </div>
                </div>
                <div class="mt-3">
                    <button id="save-btn" class="btn btn-success">作成する</button>
                    <button id="cancel-btn" class="btn btn-secondary hidden">キャンセル</button>
                </div>
            </div>

            <!-- 問題一覧 -->
            <div class="card p-4 mb-4">
                <h4>登録済み問題一覧</h4>
                <div id="questions-list">
                    <!-- JSで描画 -->
                </div>
            </div>

            <a href="index.html" class="btn btn-secondary">トップに戻る</a>
        </div>
    </div>

    <script type="module" src="js/admin/main.js"></script>
</body>

</html>
